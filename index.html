<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Paradise RPG</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/ficha.css">
    <link rel="stylesheet" href="css/curriculo.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">

</head>

<body>

    <header>

        <button id="btnFicha">Ficha</button>
        <button id="btnCurriculo">Currículo</button>

    </header>

    <main>

        <!-- FICHA -->

        <section id="ficha">

            <img
            class="template"
            src="assets/templates/ficha.png">
            

<img
id="iconeAdesivo"
class="icone-adesivo"
src="assets/icons/adesivo.png"
alt="Adicionar adesivo">

<input
type="file"
id="uploadAdesivo"
accept="image/*"
hidden>


            <!-- VIDA -->

<div class="barra vida">

    <div class="preenchimento" id="barraVida"></div>

    <div class="texto">

        <span onclick="alterarValor('vidaAtual',-1)">-</span>

        <span id="vidaAtual">50</span>

        /

        <span
        id="vidaMax"
        contenteditable="true">
            50
        </span>

        <span onclick="alterarValor('vidaAtual',1)">+</span>

    </div>

</div>

<!-- ENERGIA -->

<div class="barra energia">

    <div class="preenchimento" id="barraEnergia"></div>

    <div class="texto">

        <span onclick="alterarValor('energiaAtual',-1)">-</span>

        <span id="energiaAtual">50</span>

        /

        <span
        id="energiaMax"
        contenteditable="true">
            50
        </span>

        <span onclick="alterarValor('energiaAtual',1)">+</span>

    </div>

</div>

<!-- SANIDADE -->

<div class="barra sanidade">

    <div class="preenchimento" id="barraSanidade"></div>

    <div class="texto">

        <span onclick="alterarValor('sanidadeAtual',-1)">-</span>

        <span id="sanidadeAtual">50</span>

        /

        <span
        id="sanidadeMax"
        contenteditable="true">
            50
        </span>

        <span onclick="alterarValor('sanidadeAtual',1)">+</span>

    </div>

</div>

<!-- DP -->

<input
type="number"
id="dp"
value="6">

<!-- ATRIBUTOS -->

<input
type="number"
id="forca"
class="atributo forca"
value="7">

<input
type="number"
id="agilidade"
class="atributo agilidade"
value="8">

<input
type="number"
id="inteligencia"
class="atributo inteligencia"
value="6">

<input
type="number"
id="carisma"
class="atributo carisma"
value="5">

<input
type="number"
id="percepcao"
class="atributo percepcao"
value="9">

<!-- HABILIDADES -->

<textarea
class="habilidades">
Digite as habilidades passivas aqui...

</textarea>
<textarea
class="habilidadesB">
Digite as habilidades classe B aqui...

</textarea>
<textarea
class="habilidadesZ">
Digite as habilidades classe Z aqui...

</textarea>

            <input
            id="nome"
            class="campo-nome"
            value="Kevin">

            <img
            id="foto"
            class="foto-personagem"
            src="assets/personagens/foto.png"> 

            <input
            type="file"
            id="uploadFoto">

        </section>

        <!-- CURRÍCULO -->

        <section id="curriculo">

<img
class="template"
src="assets/templates/curriculo.png">

<!-- FOTO -->

<img
id="fotoCurriculo"
class="foto-curriculo"
src="assets/personagens/foto.png">

<!-- NOME -->

<input
type="text"
class="nome-curriculo"
value="Kevin">

<!-- DADOS -->

<input
type="text"
class="idade"
placeholder="Idade">

<input
type="text"
class="profissao"
placeholder="Profissão">

<input
type="text"
class="origem"
placeholder="Origem">

<input
type="text"
class="melhor-amigo"
placeholder="Melhor amigo">

<input
type="text"
class="amigos"
placeholder="Amigos">
<input
type="text"
class="amigos2"
placeholder="Outros amigos">

<input
type="text"
class="luta"
placeholder="Sabe lutar?">

<!-- Cartão -->
 <input
type="text"
class="nome-cartao"
placeholder="Carlos">
 <input
type="text"
class="numero-cartao"
placeholder="00-00">
 <input
type="text"
class="assinatura"
placeholder="Carlos">

<!-- INTERESSES -->

<textarea
class="interesses"></textarea>

<!-- PERSONALIDADE -->

<textarea
class="personalidade"></textarea>

<!-- HISTÓRIA -->

<textarea
class="historia"></textarea>

<!-- FRASE -->

<textarea
type="text"
class="frase"
></textarea>

        </section>

    </main>

    <script src="js/app.js"></script>
    <script src="js/ficha.js"></script>
    <script src="js/storage.js"></script>

</body>

</html>
